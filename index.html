<style>

input,textarea{font-family:inherit}

@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes vital-pulse{0%,100%{box-shadow:inset 0 0 0 1px rgba(239,68,68,0.4)}50%{box-shadow:inset 0 0 0 1px rgba(239,68,68,0.9),0 0 12px rgba(239,68,68,0.25)}}
@keyframes score-glow{0%,100%{text-shadow:none}50%{text-shadow:0 0 32px rgba(165,28,28,0.6),0 0 4px rgba(245,241,232,0.2)}}
@keyframes ekg-sweep{0%{stroke-dashoffset:2400}100%{stroke-dashoffset:0}}
@keyframes hr-flicker{0%,40%,100%{opacity:1}45%,55%{opacity:.55}}
@keyframes bubble-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes case-fade{from{opacity:0}to{opacity:1}}
@keyframes sheet-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.bubble{animation:bubble-in 380ms cubic-bezier(0.2,0.8,0.2,1) both}
.case-fade{animation:case-fade 600ms cubic-bezier(0.2,0.8,0.2,1) both}
.sheet-up{animation:sheet-up 180ms cubic-bezier(0.2,0.8,0.2,1) both}
.vital-bad{animation:vital-pulse 1.5s cubic-bezier(0.2,0.8,0.2,1) infinite}
.chip:hover{background:#222}.chip:active{transform:scale(0.96)}

<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef} = React;
const MONO="'JetBrains Mono',ui-monospace,monospace";
const SERIF="'Source Serif 4',Georgia,serif";
const DISPLAY="'Instrument Serif',Georgia,serif";
const EASE="cubic-bezier(0.2,0.8,0.2,1)";
const C={
  bg:"#0a0a0a",bg2:"#141414",bg3:"#1a1a1a",
  text:"#f5f1e8",dim:"rgba(245,241,232,0.65)",faint:"rgba(245,241,232,0.35)",
  border:"rgba(245,241,232,0.12)",
  red:"#8B0000",redBright:"#a51c1c",redDim:"rgba(139,0,0,0.4)",
  amber:"#d4a04a",amberBg:"rgba(180,120,40,0.10)",amberBorder:"rgba(212,160,74,0.45)",
  slateBg:"rgba(80,95,120,0.12)",slateBorder:"rgba(122,133,153,0.30)",
  indigo:"#9098c4",indigoBg:"rgba(90,100,140,0.10)",indigoBorder:"rgba(144,152,196,0.35)",
  docBg:"rgba(60,80,72,0.30)",docBorder:"rgba(120,160,140,0.40)",doc:"#cfd9d2",
  good:"#10b981",goodMuted:"rgba(16,185,129,0.75)",
  bad:"#ef4444",badMuted:"rgba(239,68,68,0.78)"
};

// ── JSON PARSE ──────────────────────────────────────────────────────────────
const extractJSON=raw=>{
  if(!raw)throw new Error("Empty");
  let s=String(raw).replace(/```json/gi,"").replace(/```/g,"").trim();
  const first=s.indexOf("{");if(first===-1)throw new Error("No JSON");
  let depth=0,end=-1,inStr=false,esc=false;
  for(let i=first;i<s.length;i++){
    const ch=s[i];if(esc){esc=false;continue}if(ch==="\\"){esc=true;continue}
    if(ch==='"'){inStr=!inStr;continue}if(inStr)continue;
    if(ch==="{")depth++;else if(ch==="}"){depth--;if(depth===0){end=i;break}}
  }
  if(end===-1)throw new Error("Unbalanced");
  const c=s.slice(first,end+1);
  try{return JSON.parse(c)}catch{return JSON.parse(c.replace(/,(\s*[}\]])/g,"$1"))}
};

const callAPI=async(model,system,user,maxTokens=1800)=>{
  const userKey=localStorage.getItem("doorway_api_key");
  const headers={"content-type":"application/json"};
  if(userKey)headers["x-user-api-key"]=userKey;
  const r=await fetch("/api/claude",{method:"POST",headers,body:JSON.stringify({model,max_tokens:maxTokens,system,messages:[{role:"user",content:user}]})});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||`API ${r.status}`);
  const text=(d.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("\n");
  try{return extractJSON(text)}catch(e){console.error("Raw:",text);throw new Error("Bad JSON from model")}
};
const HAIKU="claude-haiku-4-5";
const SONNET="claude-sonnet-4-20250514";

// ── UTILS ───────────────────────────────────────────────────────────────────
const isNonWhite=eth=>!eth?false:/(hispan|latin|black|african|asian|native|indigen|pacific|middle east|arab|south asian|east asian)/i.test(eth);
const recordDemo=eth=>{try{const a=JSON.parse(localStorage.getItem("dw_demo")||"[]");a.push({nw:isNonWhite(eth)});localStorage.setItem("dw_demo",JSON.stringify(a.slice(-30)))}catch{}};
const needsNonWhite=()=>{try{const a=JSON.parse(localStorage.getItem("dw_demo")||"[]");if(a.length<5)return false;const l=a.slice(-10);return(l.filter(x=>x.nw).length/l.length)<0.30}catch{return false}};
const getRecent=()=>{try{return JSON.parse(localStorage.getItem("dw_recent")||"[]")}catch{return[]}};
const recordRecent=(dx,cc)=>{try{const a=getRecent();a.push({d:dx,c:cc});localStorage.setItem("dw_recent",JSON.stringify(a.slice(-10)))}catch{}};

// ── PEDIATRIC VITALS ────────────────────────────────────────────────────────
const flagVital=(field,val,age)=>{
  const v=parseFloat(val);if(isNaN(v))return false;const a=age||30;
  if(field==="HR"){if(a<0.08)return v<100||v>160;if(a<1)return v<100||v>150;if(a<3)return v<90||v>140;if(a<8)return v<80||v>120;if(a<18)return v<60||v>100;return v<60||v>100}
  if(field==="RR"){if(a<0.08)return v<30||v>60;if(a<1)return v<25||v>40;if(a<3)return v<20||v>30;if(a<8)return v<18||v>25;if(a<18)return v<15||v>20;return v<12||v>20}
  if(field==="SpO2")return v<94;if(field==="GCS")return v<15;return false;
};

// ── SETTINGS ────────────────────────────────────────────────────────────────
const SettingsModal=({onClose})=>{
  const [key,setKey]=useState(()=>localStorage.getItem("doorway_api_key")||"");
  const [saved,setSaved]=useState(false);
  const save=()=>{key.trim()?localStorage.setItem("doorway_api_key",key.trim()):localStorage.removeItem("doorway_api_key");setSaved(true);setTimeout(()=>setSaved(false),2200)};
  return(
    <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="sheet-up" style={{width:"100%",background:C.bg2,border:`1px solid ${C.border}`,borderBottom:"none",borderRadius:"14px 14px 0 0",padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div className="mono" style={{fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:C.red}}>Settings</div>
          <button onClick={onClose} style={{color:C.dim,fontSize:22,padding:"0 4px"}}>×</button>
        </div>
        <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Your Anthropic API Key</div>
        <div style={{fontSize:13,color:C.dim,lineHeight:1.6,marginBottom:14}}>Add your own key for unlimited use. Get one at <a href="https://console.anthropic.com" target="_blank" style={{color:C.amber,textDecoration:"none"}}>console.anthropic.com</a>. Stored only in your browser.</div>
        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." style={{width:"100%",background:C.bg3,border:`1px solid ${C.border}`,borderRadius:4,padding:"11px 12px",fontSize:12,color:C.text,outline:"none",fontFamily:MONO,marginBottom:12}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={save} style={{flex:1,padding:"12px 0",background:saved?"rgba(16,185,129,0.2)":C.red,color:C.text,borderRadius:4,fontSize:12,fontFamily:MONO,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:500}}>{saved?"Saved ✓":"Save Key"}</button>
          {key&&<button onClick={()=>{localStorage.removeItem("doorway_api_key");setKey("")}} style={{padding:"12px 16px",border:`1px solid ${C.border}`,borderRadius:4,fontSize:12,fontFamily:MONO,letterSpacing:"0.1em",textTransform:"uppercase",color:C.dim}}>Clear</button>}
        </div>
        <div style={{marginTop:12,fontSize:11,color:C.faint,textAlign:"center"}}>Without a key, free daily usage applies. With your key, unlimited.</div>
      </div>
    </div>
  );
};

// ── VITALS STRIP ────────────────────────────────────────────────────────────
const VitalsStrip=({onSettings})=>{
  const [hr,setHr]=useState(72);
  useEffect(()=>{const i=setInterval(()=>setHr(70+Math.floor(Math.random()*5)),1100);return()=>clearInterval(i)},[]);
  const today=new Date();
  const stamp=`${String(today.getMonth()+1).padStart(2,"0")}${String(today.getDate()).padStart(2,"0")}.${today.getFullYear()}`;
  return(
    <div style={{position:"sticky",top:0,zIndex:30,height:36,background:"#000",borderBottom:`1px solid ${C.redDim}`,display:"flex",alignItems:"center",padding:"0 14px",gap:18,fontFamily:MONO,fontSize:10,letterSpacing:"0.05em"}}>
      <span style={{color:C.red,display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:6,height:6,borderRadius:"50%",background:C.red,animation:"pulse-dot 1.1s infinite"}}/>LIVE</span>
      <span style={{color:C.dim}}>HR <span style={{color:C.text,animation:"hr-flicker 1.1s infinite",display:"inline-block",minWidth:18}}>{hr}</span></span>
      <span style={{color:C.dim}}>BP <span style={{color:C.text}}>118/76</span></span>
      <span style={{color:C.dim}}>SpO₂ <span style={{color:C.text}}>98</span></span>
      <span style={{marginLeft:"auto",color:C.faint}}>{stamp}</span>
      {onSettings&&<button onClick={onSettings} style={{color:C.faint,fontSize:15,marginLeft:6,padding:"0 4px"}} title="Settings">⚙</button>}
    </div>
  );
};

// ── EKG TRACE ───────────────────────────────────────────────────────────────
const EKGTrace=()=>{
  const W=2400,H=80,mid=H/2;let d=`M 0 ${mid}`;
  for(let x=0;x<W;x+=200){d+=` L ${x+50} ${mid} L ${x+58} ${mid-3} L ${x+66} ${mid+2} L ${x+80} ${mid} L ${x+86} ${mid+6} L ${x+92} ${mid-28} L ${x+100} ${mid+14} L ${x+108} ${mid} L ${x+130} ${mid-4} L ${x+150} ${mid} L ${x+200} ${mid}`}
  return(<svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.18,pointerEvents:"none"}}><path d={d} fill="none" stroke={C.red} strokeWidth="1.2" strokeDasharray="2400" style={{animation:"ekg-sweep 9s linear infinite"}}/></svg>);
};

// ── STEP BLOCK ──────────────────────────────────────────────────────────────
const StepBlock=({n,title,body,delay})=>{
  const ref=useRef(null);const [vis,setVis]=useState(false);
  useEffect(()=>{if(!ref.current)return;const io=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);io.disconnect()}},{threshold:0.2});io.observe(ref.current);return()=>io.disconnect()},[]);
  return(<div ref={ref} style={{display:"flex",gap:24,marginBottom:56,opacity:vis?1:0,transform:vis?"none":"translateY(20px)",transition:`all 900ms ${EASE} ${delay}ms`}}><div style={{flexShrink:0,fontSize:42,fontFamily:MONO,fontWeight:700,color:`${C.red}b0`,letterSpacing:"-0.04em",lineHeight:1}}>{n}</div><div><h3 style={{fontSize:24,fontWeight:600,margin:"0 0 10px",letterSpacing:"-0.02em",lineHeight:1.15}}>{title}</h3><p style={{fontSize:15,color:C.dim,margin:0,lineHeight:1.6}}>{body}</p></div></div>);
};

// ── CALIBRATION CHART ───────────────────────────────────────────────────────
const CalibrationChart=({stats})=>{
  const history=(stats.history||[]).slice(-20);
  if(history.length<5)return null;
  const caught=history.filter(e=>e.caught).length;
  const W=300,H=70,pad=10;
  const pts=history.map((e,i)=>({x:pad+(i/(Math.max(history.length-1,1)))*(W-2*pad),y:pad+((100-e.score)/100)*(H-2*pad),caught:e.caught}));
  return(<div style={{margin:"24px 0 4px",padding:14,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:4}}>
    <div className="mono" style={{fontSize:9,textTransform:"uppercase",letterSpacing:"0.2em",color:C.faint,marginBottom:10}}>Calibration · last {history.length} cases</div>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block"}}><line x1={pad} y1={H/2} x2={W-pad} y2={H/2} stroke={C.border} strokeWidth="1" strokeDasharray="3"/>{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3.5" fill={p.caught?"rgba(16,185,129,0.8)":"rgba(239,68,68,0.8)"}/>)}</svg>
    <div className="mono" style={{fontSize:10,color:C.dim,marginTop:6,display:"flex",gap:16,flexWrap:"wrap"}}><span>Caught <span style={{color:C.good}}>{caught}/{history.length}</span></span><span>Avg <span style={{color:C.text}}>{stats.avg}</span></span>{stats.streak>0&&<span>🔥 <span style={{color:C.text}}>{stats.streak}d</span></span>}</div>
  </div>);
};

// ── LANDING ─────────────────────────────────────────────────────────────────
const CASES_LIST=[
  ["Aortic dissection","presenting as MI or stroke"],["Subarachnoid hemorrhage","as the headache that's 'better now'"],
  ["Early septic shock","with a normal blood pressure"],["Mesenteric ischemia","pain wildly out of proportion"],
  ["Atypical STEMI","in women, in diabetics, in the elderly"],["PE","in the patient dismissed as anxious"],
  ["Necrotizing fasciitis","that looked like cellulitis"],["Temporal arteritis","the headache in the 72-year-old"],
  ["Testicular torsion","presenting as abdominal pain"],["Cauda equina","the back pain with subtle retention"],
];

const Landing=({onEnter,onSettings,stats})=>{
  const [m,setM]=useState(false);
  useEffect(()=>{setM(true)},[]);
  return(<div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:SERIF}}>
    <VitalsStrip onSettings={onSettings}/>
    <section style={{position:"relative",padding:"96px 24px 80px",overflow:"hidden"}}>
      <EKGTrace/>
      <div style={{position:"relative",zIndex:1,opacity:m?1:0,transform:m?"none":"translateY(12px)",transition:`all 900ms ${EASE}`}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.32em",textTransform:"uppercase",color:C.red,marginBottom:36}}>An ER Gestalt Trainer</div>
        <h1 style={{fontSize:"clamp(72px,17vw,124px)",lineHeight:0.84,fontWeight:700,letterSpacing:"-0.045em",margin:0}}>The<br/><span className="display" style={{fontWeight:400,letterSpacing:"-0.04em"}}>Doorway.</span></h1>
        <div style={{height:1,width:72,background:C.red,margin:"36px 0"}}/>
        <p style={{fontSize:19,lineHeight:1.55,color:C.dim,maxWidth:480,margin:0}}>Every ER doctor develops a sixth sense — the read from the hallway, the hunch before the labs come back.</p>
        <p style={{fontSize:19,lineHeight:1.55,maxWidth:480,marginTop:18}}>It's called clinical gestalt. The hardest thing in medicine to teach.</p>
        <p className="display" style={{fontSize:22,lineHeight:1.45,maxWidth:480,marginTop:22}}>This is the place you practice it.</p>
      </div>
      <CalibrationChart stats={stats}/>
      <button onClick={onEnter} style={{position:"relative",zIndex:1,marginTop:20,display:"inline-flex",alignItems:"center",gap:14,padding:"20px 34px",background:C.text,color:C.bg,fontFamily:MONO,fontSize:13,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:500}}>
        <span style={{width:8,height:8,background:C.red,borderRadius:"50%"}}/>{stats.cases>0?"Accept Next Patient":"Walk through the doorway"}<span>→</span>
      </button>
      <div className="mono" style={{position:"relative",zIndex:1,marginTop:14,fontSize:10,color:C.faint}}>No signup. A patient is waiting.</div>
    </section>

    <section style={{padding:"72px 24px",borderTop:`1px solid ${C.border}`}}>
      <div className="mono" style={{fontSize:10,letterSpacing:"0.32em",textTransform:"uppercase",color:C.red,marginBottom:54}}>How it works</div>
      {[["01","A patient arrives.","Chief complaint. Vitals. How they look. Two seconds to form your read — sick or not sick."],["02","You work the problem.","Ask history. Examine. Order labs. The patient answers in character. Type freely — compound actions work."],["03","You stabilize. You decide. You learn.","DDx ranked. Disposition. Were you packaged for transfer? A senior attending grades you on the decisions that actually matter in rural EM."]].map(([n,t,b],i)=>(<StepBlock key={n} n={n} title={t} body={b} delay={i*120}/>))}
    </section>

    <section style={{padding:"80px 24px",borderTop:`2px solid ${C.red}`,background:C.bg2}}>
      <div className="mono" style={{fontSize:10,letterSpacing:"0.32em",textTransform:"uppercase",color:C.red,marginBottom:28}}>Why this exists</div>
      <blockquote className="display" style={{fontSize:26,lineHeight:1.32,fontWeight:400,margin:0,letterSpacing:"-0.005em"}}>"Rural ER docs are the last generalists in medicine. Resuscitationist, generalist, and transport medicine specialist — all in one shift, often alone, often at 3 AM."</blockquote>
      <div style={{height:1,width:48,background:C.red,margin:"28px 0"}}/>
      <p style={{fontSize:15,color:C.dim,lineHeight:1.7,margin:0}}>No commercial simulator trains the gestalt itself. None teaches the rural-specific decision: recognize → stabilize → package → transfer. None lives on your phone for ninety seconds between patients.</p>
      <p style={{fontSize:15,lineHeight:1.7,fontWeight:600,marginTop:14,marginBottom:0}}>This one does.</p>
    </section>

    <section style={{padding:"72px 24px",borderTop:`1px solid ${C.border}`}}>
      <div className="mono" style={{fontSize:10,letterSpacing:"0.32em",textTransform:"uppercase",color:C.red,marginBottom:32}}>The cases you'll see</div>
      {CASES_LIST.map(([a,b])=>(<div key={a} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:16,padding:"12px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:15,fontWeight:600,letterSpacing:"-0.01em",flexShrink:0}}>{a}</span><span className="display" style={{fontSize:13,color:C.faint,textAlign:"right"}}>{b}</span></div>))}
      <p style={{marginTop:18,fontSize:12,color:C.faint,fontStyle:"italic",lineHeight:1.65}}>Plus everything else — the ear infections, the sprained ankles, the nursing home transfers, the unplanned delivery, the farm injury, the kid with RSV at 2 AM. Rural medicine in full.</p>
    </section>

    <section style={{padding:"64px 24px",borderTop:`1px solid ${C.border}`}}>
      <div className="mono" style={{fontSize:10,letterSpacing:"0.32em",textTransform:"uppercase",color:C.red,marginBottom:28}}>What this is not</div>
      {[["Not a quiz.","You don't pick A, B, C, D. You ask, examine, and order — the way you actually work."],["Not a textbook.","Every case has a hidden truth. The model plays the patient. You play the doctor."],["Not a simulator.","It's a calibration tool. Over cases, it surfaces your personal blind spots."],["Not for sale.","Open source. Free. Your data stays in your browser."]].map(([t,b])=>(<div key={t} style={{paddingTop:16,marginBottom:18,borderTop:`1px solid ${C.red}40`}}><div style={{fontSize:19,fontWeight:600,letterSpacing:"-0.015em",marginBottom:5}}>{t}</div><div style={{fontSize:13,color:C.dim,lineHeight:1.55}}>{b}</div></div>))}
    </section>

    <section style={{padding:"110px 24px 90px",borderTop:`1px solid ${C.border}`,textAlign:"center"}}>
      <p style={{fontSize:"clamp(40px,9vw,56px)",lineHeight:1.02,fontWeight:700,letterSpacing:"-0.04em",maxWidth:480,margin:"0 auto 44px"}}>What's<br/>coming through<br/>the <span className="display" style={{fontWeight:400,color:C.red}}>door</span>?</p>

const FITZ_RGB=[[245,220,196],[232,197,163],[212,163,115],[176,125,90],[138,90,60],[74,44,26]];
const lerpRGB=(a,b,t)=>[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];
const rgb=r=>`rgb(${r[0]},${r[1]},${r[2]})`;
const applyPallor=(base,i)=>{if(i<=0)return base;const t=Math.min(1,i*0.18);const lum=0.299*base[0]+0.587*base[1]+0.114*base[2];const ash=base[0]<150?[Math.min(255,lum+10),Math.min(255,lum+12),Math.min(255,lum+18)]:[lum,lum,lum];return lerpRGB(base,ash,t)};
const scleraCol=j=>{const b=[245,240,232];return j<=0?rgb(b):rgb(lerpRGB(b,[250,225,110],Math.min(1,j*0.28)))};
const lipCol=(base,c)=>{const dl=[Math.max(60,base[0]-60),Math.max(40,base[1]-65),Math.max(50,base[2]-50)];return c<=0?rgb(dl):rgb(lerpRGB(dl,[78,70,130],Math.min(1,c*0.28)))};
const nailCol=c=>c<=0?"rgb(220,180,170)":rgb(lerpRGB([220,180,170],[70,80,140],Math.min(1,c*0.32)));

// Derek's clinical framework: Resuscitationist + Generalist + Transport Medicine Specialist
// Mental model: Recognize → Stabilize → Package → Transfer
const DEREK_FRAMEWORK=`
DEREK'S ROLE CONTEXT (critical for realistic case generation):
Derek is a solo rural emergency physician at a critical access hospital. His job is NOT to be a subspecialist or definitive surgeon. His excellence lies in: recognition, stabilization, and safe transition of care.

Core domains to drill (generate cases that test these):
1. RESUSCITATION: shock differentiation (septic/cardiogenic/obstructive/hemorrhagic), code management, post-ROSC, initial vent management, pressors/sedation
2. AIRWAY: RSI decisions (including hemodynamically unstable), failed airway, surgical airway need
3. VASCULAR ACCESS: when to do IO, central line, ultrasound-guided IV
4. TRAUMA STABILIZATION: massive transfusion, chest tube vs needle decom, pelvic binder, TXA timing, TBI management, FAST exam
5. PEDIATRICS: weight-based dosing decisions, pediatric airway, pediatric septic shock, NRP basics
6. OB EMERGENCIES: unplanned delivery, shoulder dystocia, PPH, eclampsia, neonatal resuscitation
7. CARDIAC: STEMI recognition + lytics decision (no cath lab), cardiogenic shock, unstable arrhythmia, temporary pacing
8. VENT MANAGEMENT: initial settings, ARDS basics, adjusting for acidosis while awaiting transfer
9. POCUS: when to do FAST, cardiac tamponade recognition, pneumothorax on US, AAA screening, bilateral lung exam
10. TRANSFER MEDICINE: recognizing who needs transfer EARLY, stabilization before transport (airway secure? blood hanging? pressor stable? sedation adequate?), calling receiving facility efficiently

The key grading question for serious cases: "Did Derek recognize early, stabilize correctly, and package safely for transfer?"`;

const buildMenu=(forceNW,recent)=>{
  const recentStr=recent.length>0?`\nDo NOT repeat: ${recent.map(c=>`${c.d} (${c.c})`).join(", ")}.\n`:"";
  const forceStr=forceNW?"\nFOR THIS CASE: ethnicity MUST be non-white.\n":"";
  return`Generate a realistic rural emergency department patient case.${recentStr}${forceStr}
${DEREK_FRAMEWORK}

CASE DISTRIBUTION:
75% NON-LIFE-THREATENING (the actual day-to-day reality):
Urgent care level: URI, sore throat, ear infection, strep, sinusitis, bronchitis, uncomplicated UTI, vaginal discharge, STI screening, ankle/wrist sprain, minor laceration, simple burn, chronic back pain (no red flags), tension headache, migraine, rash, mild allergic reaction, insect/tick bite, dental pain, med refill, wound recheck, foreign body (splinter/ear/nose), constipation, gastroenteritis, GERD, contusion.
Pediatric non-emergent: viral fever in toddler, ear infection, mild croup, URI, minor fall, viral rash, feeding concern, vomiting/diarrhea in infant.
Geriatric non-emergent: BPPV/dizziness, chronic pain flare, med side effect, deconditioning weakness, wound recheck.
Nursing home transfers — stable: AMS that's dehydration/UTI/constipation, med reconciliation, fall to r/o fracture, skin breakdown, PEG/Foley issue, family-requested eval of declining elderly patient.

25% SERIOUS OR POTENTIALLY SERIOUS — weighted toward Derek's skill domains:

RESUSCITATION CASES (test recognize→stabilize→transfer):
- Septic shock: elderly nursing home patient, near-normal vitals early
- Cardiogenic shock: STEMI or acute CHF with hemodynamic compromise
- Obstructive shock: massive PE or tension PTX
- Hemorrhagic shock: GI bleed, ruptured ectopic, trauma

AIRWAY CASES:
- RSI decision: angioedema, epiglottitis, AMS with GCS decline, post-arrest
- Failed airway: anticipated difficulty (obese, beard, bull neck)
- Surgical airway scenario: complete obstruction

TRAUMA STABILIZATION:
- Farm/ag: PTO entanglement, auger injury, crush, amputation — what must be fixed before transport?
- Penetrating: stab/GSW chest or abdomen — chest tube vs observation?
- Blunt: MVC with occult injury — what's the FAST showing?
- Elderly fall on anticoagulation with delayed ICH
- Massive hemorrhage: when to activate massive transfusion, TXA timing, damage control

OB EMERGENCIES:
- Unplanned ED delivery (precipitous labor)
- Shoulder dystocia during delivery
- Postpartum hemorrhage
- Eclampsia / severe preeclampsia
- Ectopic pregnancy with hemodynamic instability

PEDIATRIC EMERGENCIES:
- Respiratory failure: RSV with impending apnea, foreign body aspiration, status asthmaticus, epiglottitis
- Septic shock (pediatric): weight-based fluid, antibiotics
- Febrile seizure vs new-onset seizure
- DKA in new-onset T1DM
- Non-accidental trauma (subtle signs)
- Intussusception, appendicitis

CARDIAC:
- STEMI: lytics decision (no cath lab, 60+ min transfer)
- Unstable arrhythmia: AFib with RVR, VT, SVT
- Cardiogenic shock with limited ICU support

MOST-MISSED MIMICS (high teaching value):
- Aortic dissection as MI or back pain
- SAH as resolved headache
- Bacterial meningitis as flu
- Mesenteric ischemia (pain out of proportion)
- Cauda equina with subtle urinary retention
- Necrotizing fasciitis as cellulitis
- Temporal arteritis in elderly
- Testicular torsion as abdominal pain

ENVIRONMENTAL/TOX:
- Opioid OD, meth psychosis, alcohol withdrawal with seizure risk, acetaminophen OD
- Snakebite, hypothermia, heat stroke, anaphylaxis

Demographic mix: ~75% white, 10% Hispanic/Latino, 8% Black, 3% Native American, 2% Asian, 2% other.
Age mix: neonates/infants 5%, children 1-12y 15%, adolescents 5%, adults 18-64y 50%, elderly 65-84y 15%, very elderly/NH 85+ 10%.
Fitzpatrick mapping (no exceptions): Northern European → 1-2. Mediterranean/Hispanic/Latino → 3-4. South Asian → 4-5. East Asian → 2-4. African/African American → 5-6 (MINIMUM 5). Native American → 3-5. fitz MUST match ethnicity.`;

mono: true ONLY for lab values and numeric imaging reads.
obs: string if something visibly changes (adds separate observation bubble).

  const labels={doc:"You",patient:patient?.name?.split(" ")[0]||"Pt",clinical:"Clinical",obs:"You see"};

  // SCORE VIEW
  if(view==="score"&&score){
    const sc=score.score>=80?C.goodMuted:score.score>=60?C.amber:C.badMuted;
    return(<div className="case-fade" style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:SERIF,display:"flex",flexDirection:"column",padding:16}}>
      <div style={{textAlign:"center",margin:"28px 0 18px"}}>
        <div className="mono" style={{fontSize:10,letterSpacing:"0.32em",textTransform:"uppercase",color:C.faint}}>Score</div>
        <div className={displayScore===score.score?"score-glow":""} style={{fontSize:84,fontFamily:MONO,fontWeight:700,color:sc,letterSpacing:"-0.04em",lineHeight:1,marginTop:6}}>{displayScore}</div>
        <div style={{fontSize:13,color:C.dim,marginTop:8}}>True diagnosis: <span className="display" style={{color:C.amber,fontSize:16}}>{score.trueDx}</span></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
        {[["Caught",score.caughtInDdx,score.caughtInDdx?"✓":"✗"],["Dispo",score.dispoOk,score.dispoOk?"✓":"✗"],["Gestalt",["spot-on","close"].includes(score.gestaltCal),score.gestaltCal],["Workup",["lean","appropriate"].includes(score.workup),score.workup],["Stabilization",["excellent","adequate"].includes(score.stabilizationGrade),score.stabilizationGrade||"—"],["Transfer prep",score.transferPackagingOk!==false,score.transferPackagingOk===false?"✗":"✓"]].map(([k,g,val])=>(
          <div key={k} style={{padding:9,borderRadius:4,border:`1px solid ${g?"rgba(16,185,129,0.4)":"rgba(239,68,68,0.4)"}`,background:g?"rgba(16,185,129,0.07)":"rgba(239,68,68,0.07)"}}>
            <div className="mono" style={{fontSize:8,textTransform:"uppercase",color:C.dim,letterSpacing:"0.12em"}}>{k}</div>
            <div style={{fontSize:13,marginTop:3}}>{val}</div>
          </div>
        ))}
      </div>
      {score.missedCantMiss?.length>0&&<div style={{padding:10,background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.35)",borderRadius:4,marginBottom:8,fontSize:13}}><span style={{color:C.badMuted,fontWeight:600}}>⚠ Missed: </span>{score.missedCantMiss.join(", ")}</div>}
      {score.criticalActionsMissed?.length>0&&<div style={{padding:10,background:"rgba(139,0,0,0.12)",border:"1px solid rgba(139,0,0,0.5)",borderRadius:4,marginBottom:8,fontSize:13}}><span style={{color:"#f87171",fontWeight:600}}>⚠ Critical actions missed: </span>{score.criticalActionsMissed.join(", ")}</div>}
      {score.wins?.map((w,i)=><div key={"w"+i} style={{padding:7,background:"rgba(16,185,129,0.06)",borderLeft:`2px solid ${C.goodMuted}`,fontSize:13,marginBottom:4}}>✓ {w}</div>)}
      {score.misses?.map((w,i)=><div key={"m"+i} style={{padding:7,background:"rgba(239,68,68,0.06)",borderLeft:`2px solid ${C.badMuted}`,fontSize:13,marginBottom:4}}>✗ {w}</div>)}
      <div style={{marginTop:12,padding:12,background:C.amberBg,borderLeft:`2px solid ${C.amber}`,borderRadius:4,fontSize:14,fontStyle:"italic",fontFamily:DISPLAY,lineHeight:1.45}}>
        {score.teaching}
        {score.teachingLong&&<div style={{marginTop:10,fontStyle:"normal",fontFamily:SERIF,color:C.dim,fontSize:12,lineHeight:1.55}}>{score.teachingLong}</div>}
      </div>
      {score.ruralLesson&&<div style={{marginTop:10,fontSize:12,color:C.dim}}><span className="mono" style={{fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:C.red,marginRight:6}}>Rural</span>{score.ruralLesson}</div>}
      <div style={{marginTop:"auto",paddingTop:16,display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={newCase} style={{padding:18,background:C.red,color:C.text,borderRadius:4,fontSize:13,fontWeight:500,fontFamily:MONO,letterSpacing:"0.14em",textTransform:"uppercase",boxShadow:`0 16px 40px -16px ${C.red}`}}>Next Patient →</button>
        {sessionCases>0&&<div className="mono" style={{textAlign:"center",fontSize:10,color:C.faint,letterSpacing:"0.08em"}}>Session: {sessionCases} {sessionCases===1?"case":"cases"} · avg {sessionAvg}{stats.streak>0?` · 🔥 ${stats.streak}d`:""}.</div>}
        <button onClick={onHome} style={{padding:10,border:`1px solid ${C.border}`,background:"transparent",color:C.dim,borderRadius:4,fontSize:11,fontFamily:MONO,letterSpacing:"0.1em",textTransform:"uppercase"}}>Home</button>
      </div>
    </div>);
  }

  // CASE VIEW
  return(<div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:SERIF,display:"flex",flexDirection:"column"}}>
    <div style={{height:2,background:"transparent",position:"sticky",top:0,zIndex:25}}>
      <div style={{height:"100%",background:C.red,width:`${Math.min(100,timer/4.8)}%`,transition:"width 1s linear"}}/>
    </div>
    <header style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderBottom:`1px solid ${C.border}`,background:"rgba(10,10,10,0.92)",backdropFilter:"blur(8px)",zIndex:20}}>
      <button onClick={onHome} style={{color:C.dim,fontSize:11,fontFamily:MONO,letterSpacing:"0.12em",textTransform:"uppercase",padding:"4px 6px"}}>← Home</button>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div className="mono" style={{fontSize:10,color:C.faint,letterSpacing:"0.06em"}}>{stats.cases>0&&`#${stats.cases} · avg ${stats.avg}`}{stats.streak>1&&` · 🔥${stats.streak}d`}</div>
        <div className="mono" style={{fontSize:12,color:C.dim}}>{fmt(timer)}</div>
        <button onClick={onSettings} style={{color:C.faint,fontSize:15,padding:"2px 4px"}} title="Settings">⚙</button>
      </div>
    </header>

    {error&&<div style={{margin:10,padding:10,background:"rgba(139,0,0,0.15)",border:`1px solid ${C.red}`,borderRadius:4,fontSize:12,lineHeight:1.5}}>
      {error}{(error.includes("Daily limit")||error.includes("limit reached"))
        ?<span> <button onClick={onSettings} style={{color:C.amber,textDecoration:"underline",fontSize:12,marginLeft:4}}>Add API key →</button></span>
        :<button onClick={()=>setError(null)} style={{color:C.text,textDecoration:"underline",marginLeft:8,fontSize:11}}>×</button>}
    </div>}
    {loading&&!patient&&<div className="display" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.dim,fontSize:18}}>Triaging…</div>}

    {patient&&(<div key={caseKey} className="case-fade" style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
      <div style={{padding:"10px 12px 0"}}>
        <div style={{display:"flex",gap:14}}>
          <div style={{width:96,aspectRatio:"6/7",borderRadius:4,border:`1px solid ${C.border}`,overflow:"hidden",flexShrink:0,background:"#0a0f18"}}><Avatar phys={patient.physicality}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",letterSpacing:"-0.01em"}}>{patient.name}</div>
            <div className="mono" style={{fontSize:10,color:C.dim,letterSpacing:"0.04em",marginTop:2}}>{patient.age}{patient.sex} · {patient.ethnicity||"—"} · {patient.occupation}</div>
            <div className="mono" style={{fontSize:9,color:C.faint,marginTop:1}}>{patient.arrivalMode}</div>
            <div style={{marginTop:6,padding:8,background:C.amberBg,borderLeft:`2px solid ${C.amber}`,fontSize:13,lineHeight:1.4}}>
              <div className="mono" style={{fontSize:8,textTransform:"uppercase",color:C.amber,letterSpacing:"0.18em",marginBottom:2}}>CC</div>
              {patient.chiefComplaint}
            </div>
            {patient.emsHandoff&&<div className="display" style={{marginTop:6,fontSize:13,color:C.dim,lineHeight:1.4}}>EMS: "{patient.emsHandoff}"</div>}
          </div>
        </div>
        <div style={{marginTop:10,display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:5}}>
          {[["HR",v.HR,"HR"],["BP",v.BP,"BP"],["RR",v.RR,"RR"],["SpO₂",v.SpO2+"%","SpO2"],["T",v.Temp,"T"],["GCS",v.GCS,"GCS"]].map(([k,val,fk])=>{
            const bad=flagVital(fk,typeof val==="string"?parseFloat(val):val,age);
            return(<div key={k} className={bad?"vital-bad":""} style={{padding:"5px 2px",borderRadius:3,border:`1px solid ${bad?"rgba(239,68,68,0.5)":C.border}`,background:bad?"rgba(239,68,68,0.06)":"rgba(245,241,232,0.02)",textAlign:"center"}}>
              <div className="mono" style={{fontSize:8,textTransform:"uppercase",color:C.faint,letterSpacing:"0.1em"}}>{k}</div>
              <div className="mono" style={{fontSize:12,color:bad?"#f4b8b8":C.text,marginTop:1}}>{val}</div>
            </div>);
          })}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:7,minHeight:0}}>
        {log.map((m,i)=>(<div key={i} className="bubble" style={{display:"flex",justifyContent:m.k==="doc"?"flex-end":"flex-start"}}>
          <div style={{maxWidth:"86%",padding:"7px 11px",borderRadius:4,...bubble[m.k]}}>
            <div className="mono" style={{fontSize:8,textTransform:"uppercase",opacity:0.65,letterSpacing:"0.15em",marginBottom:2}}>{labels[m.k]}</div>
            <div style={{fontSize:m.k==="obs"?14:13,lineHeight:1.45,fontFamily:m.mono?MONO:(m.k==="obs"?DISPLAY:SERIF),fontStyle:m.k==="obs"?"italic":"normal"}}>{m.t}</div>
          </div>
        </div>))}
        {loading&&<div className="display" style={{color:C.faint,fontSize:13,fontStyle:"italic"}}>…</div>}
        <div ref={logEnd}/>
      </div>

      <div style={{borderTop:`1px solid ${C.border}`,background:C.bg}}>
        {openCat&&<div className="scrollx" style={{padding:"7px 8px 2px",display:"flex",gap:6,overflowX:"auto"}}>
          {CHIPS[openCat].map(a=>(<button key={a} onClick={()=>send(a)} className="chip" style={{flexShrink:0,padding:"7px 12px",background:C.bg3,color:C.text,borderRadius:999,fontSize:11,whiteSpace:"nowrap",border:`1px solid ${C.border}`}}>{a}</button>))}
        </div>}
        <div className="scrollx" style={{padding:"7px 8px 0",display:"flex",gap:6,overflowX:"auto"}}>
          {Object.keys(CHIPS).map(cat=>(<button key={cat} onClick={()=>{setOpenCat(openCat===cat?null:cat);haptic(8)}} className="chip mono" style={{flexShrink:0,padding:"5px 14px",background:openCat===cat?C.red:C.bg3,color:openCat===cat?C.text:C.dim,borderRadius:999,fontSize:10,fontWeight:500,letterSpacing:"0.1em",textTransform:"uppercase",border:`1px solid ${openCat===cat?C.red:C.border}`}}>{cat}</button>))}
        </div>

        {!showCommit?(<div style={{padding:10,display:"flex",flexDirection:"column",gap:9}}>
          <div style={{display:"flex",gap:6}}>
            <button onClick={voice} className="chip" style={{padding:"0 13px",borderRadius:4,background:listening?C.red:C.bg3,color:C.text,fontSize:18,border:`1px solid ${listening?C.red:C.border}`,minWidth:48}}>🎤</button>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(input)} style={{flex:1,background:C.bg3,border:`1px solid ${C.border}`,borderRadius:4,padding:"11px 12px",fontSize:13,color:C.text,outline:"none",fontFamily:SERIF}} placeholder="ask · examine · order · stabilize"/>
            <button onClick={()=>send(input)} disabled={loading||!input.trim()} style={{padding:"0 16px",background:C.red,color:C.text,borderRadius:4,fontSize:14,opacity:loading||!input.trim()?0.35:1,fontFamily:MONO,border:"none"}}>→</button>
          </div>
          <div style={{padding:10,background:"rgba(245,241,232,0.025)",border:`1px solid ${C.border}`,borderRadius:4,display:"flex",flexDirection:"column",gap:10}}>
            <div>
              <div className="mono" style={{fontSize:9,textTransform:"uppercase",color:C.dim,marginBottom:5,letterSpacing:"0.15em"}}>Gut dispo</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
                {DISPOS.map(d=><button key={d} onClick={()=>{setGestalt(d);haptic(10)}} className="chip" style={{padding:"7px 2px",borderRadius:3,background:gestalt===d?C.red:C.bg3,color:gestalt===d?C.text:C.dim,fontSize:9,lineHeight:1.2,border:`1px solid ${gestalt===d?C.red:C.border}`,fontFamily:MONO,letterSpacing:"0.03em"}}>{d}</button>)}
              </div>
            </div>
            <div>
              <div className="mono" style={{display:"flex",justifyContent:"space-between",fontSize:9,textTransform:"uppercase",color:C.dim,marginBottom:5,letterSpacing:"0.15em"}}><span>Acuity</span><span>{["","well","minor","concerning","sick","crashing"][acuity]}</span></div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
                {[1,2,3,4,5].map(n=><button key={n} onClick={()=>{setAcuity(n);haptic(10)}} className="chip" style={{padding:"9px 0",borderRadius:3,background:acuity===n?C.amber:C.bg3,color:acuity===n?C.bg:C.dim,fontFamily:MONO,fontSize:13,fontWeight:600,border:`1px solid ${acuity===n?C.amber:C.border}`}}>{n}</button>)}
              </div>
            </div>
          </div>
          <button onClick={()=>setShowCommit(true)} disabled={!gestalt} style={{padding:12,border:`1px solid ${gestalt?C.red:C.border}`,color:gestalt?C.text:C.faint,background:"transparent",borderRadius:4,fontSize:11,opacity:gestalt?1:0.45,letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:MONO}}>{gestalt?"Ready to commit →":"Set gut dispo first"}</button>
        </div>):(
          <div style={{padding:10,display:"flex",flexDirection:"column",gap:9}}>
            <input value={ddx} onChange={e=>setDdx(e.target.value)} placeholder="DDx: 1… 2… 3…" style={{background:C.bg3,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px",fontSize:13,color:C.text,outline:"none",fontFamily:SERIF}}/>
            <div>
              <div className="mono" style={{fontSize:9,textTransform:"uppercase",color:C.dim,marginBottom:5,letterSpacing:"0.15em"}}>Final dispo</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                {DISPOS.map(d=><button key={d} onClick={()=>{setFinalDispo(d);haptic(10)}} className="chip" style={{padding:"10px 4px",borderRadius:3,background:finalDispo===d?C.red:C.bg3,color:finalDispo===d?C.text:C.dim,fontSize:10,border:`1px solid ${finalDispo===d?C.red:C.border}`,fontFamily:MONO,letterSpacing:"0.03em"}}>{d}</button>)}
              </div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowCommit(false)} style={{padding:"10px 14px",border:`1px solid ${C.border}`,background:"transparent",color:C.text,borderRadius:4,fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",fontFamily:MONO}}>← Back</button>
              <button onClick={commit} disabled={loading||!ddx||!finalDispo} style={{flex:1,padding:12,background:C.red,color:C.text,borderRadius:4,fontSize:11,opacity:(loading||!ddx||!finalDispo)?0.4:1,letterSpacing:"0.14em",textTransform:"uppercase",fontWeight:500,fontFamily:MONO}}>{loading?"Grading…":"Submit & Grade"}</button>
            </div>
          </div>
        )}
      </div>
    </div>)}
  </div>);
};

// ── APP ──────────────────────────────────────────────────────────────────────
const App=()=>{
  const [view,setView]=useState(()=>{try{const p=new URLSearchParams(window.location.search);if(p.has("home")||p.has("landing"))return"landing"}catch{}return localStorage.getItem("doorway_entered")?"trainer":"landing"});
  const [showSettings,setShowSettings]=useState(false);
  const [stats,setStats]=useState(()=>{try{return JSON.parse(localStorage.getItem("doorway_stats"))||{cases:0,avg:0,streak:0,last:null,history:[]}}catch{return{cases:0,avg:0,streak:0,last:null,history:[]}}});
  const enter=()=>{localStorage.setItem("doorway_entered","1");setView("trainer")};
  return(<>
    {showSettings&&<SettingsModal onClose={()=>setShowSettings(false)}/>}
    {view==="landing"
      ?<Landing onEnter={enter} onSettings={()=>setShowSettings(true)} stats={stats}/>
      :<Trainer onHome={()=>setView("landing")} onSettings={()=>setShowSettings(true)} stats={stats} setStats={setStats}/>
    }
  </>);
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
